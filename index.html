<head>

<title>Progressia Immobilier - Suivi d'Activite</title>
<link href='https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Jost:wght@300;400;500;600&display=swap' rel='stylesheet'>
<style>
  :root{--cream:#F5F0E8;--cream2:#EDE8DF;--terra:#C4714A;--terra2:#D4845E;--terra3:#A85A38;--dark:#2B2218;--mid:#6B5A4E;--light:#A8998D;--green:#4A7C62;--amber:#B8882A;--border:rgba(180,160,140,0.3);--border2:rgba(180,160,140,0.15);--shadow2:0 2px 12px rgba(43,34,24,0.04)}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:'Jost',sans-serif;background:var(--cream);color:var(--dark);min-height:100vh}
  #login-screen{position:fixed;inset:0;background:var(--dark);display:flex;align-items:center;justify-content:center;z-index:999}
  .login-box{background:var(--cream);border-radius:8px;padding:48px 44px;width:380px;box-shadow:0 20px 60px rgba(0,0,0,0.4)}
  .login-logo{text-align:center;margin-bottom:32px}
  .login-brand{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:400;letter-spacing:5px;text-transform:uppercase;color:var(--dark);display:block;margin-top:10px}
  .login-sub{font-size:9px;font-weight:300;color:var(--light);letter-spacing:3px;text-transform:uppercase;margin-top:2px;display:block}
  .login-field{margin-bottom:16px}
  .login-field label{display:block;font-size:10px;font-weight:500;letter-spacing:1.2px;text-transform:uppercase;color:var(--mid);margin-bottom:6px}
  .login-field input{width:100%;padding:11px 14px;border:1px solid var(--border);border-radius:3px;background:#fff;font-family:'Jost',sans-serif;font-size:13px;color:var(--dark);outline:none;transition:border-color 0.2s}
  .login-field input:focus{border-color:var(--terra)}
  .login-btn{width:100%;padding:13px;background:var(--terra);color:#fff;border:none;border-radius:3px;font-family:'Jost',sans-serif;font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;margin-top:8px;transition:background 0.2s}
  .login-btn:hover{background:var(--terra2)}
  .login-error{color:#B43C3C;font-size:11.5px;text-align:center;margin-top:14px;display:none}
  #app{display:none}
  .sidebar{position:fixed;top:0;left:0;width:258px;height:100vh;background:var(--dark);display:flex;flex-direction:column;overflow-y:auto;z-index:100}
  .sidebar-brand{padding:26px 22px 20px;border-bottom:1px solid rgba(255,255,255,0.07);display:flex;flex-direction:column;align-items:center;gap:8px}
  .brand-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:400;color:var(--cream);letter-spacing:4px;text-transform:uppercase}
  .brand-sub{font-size:9px;font-weight:300;color:rgba(255,255,255,0.3);letter-spacing:3px;text-transform:uppercase;margin-top:-2px}
  .last-update{font-size:9px;color:rgba(255,255,255,0.2);letter-spacing:1px;padding:8px 22px 0;text-align:center}
  .sidebar-user{padding:12px 16px 4px;display:flex;align-items:center;gap:8px}
  .sidebar-user-av{width:28px;height:28px;border-radius:50%;background:var(--terra);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
  .sidebar-user-name{font-size:11px;color:rgba(255,255,255,0.6);flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .logout-btn{background:none;border:none;color:rgba(255,255,255,0.3);font-size:13px;cursor:pointer;padding:2px 4px;transition:color 0.15s;font-family:'Jost',sans-serif;line-height:1}
  .logout-btn:hover{color:rgba(255,255,255,0.7)}
  .sidebar-search{padding:10px 14px 6px}
  .sidebar-search input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:3px;padding:8px 12px;color:rgba(255,255,255,0.65);font-family:'Jost',sans-serif;font-size:12px;font-weight:300;letter-spacing:0.4px;outline:none;transition:border-color 0.2s}
  .sidebar-search input::placeholder{color:rgba(255,255,255,0.2)}
  .sidebar-search input:focus{border-color:var(--terra2)}
  .sidebar-section-label{padding:12px 18px 5px;font-size:9px;font-weight:500;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,0.18)}
  .sidebar-list{flex:1;padding:0 8px 24px}
  .sidebar-item{display:flex;align-items:center;gap:9px;padding:8px 12px;border-radius:3px;cursor:pointer;transition:all 0.15s;color:rgba(255,255,255,0.45);font-size:12.5px;font-weight:400;letter-spacing:0.2px}
  .sidebar-item:hover{background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.8)}
  .sidebar-item.active{background:var(--terra);color:#fff}
  .sidebar-item .av{width:25px;height:25px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-family:'Cormorant Garamond',serif;font-size:10px;font-weight:600;background:rgba(255,255,255,0.1);letter-spacing:0.5px}
  .sidebar-item.active .av{background:rgba(255,255,255,0.22)}
  .main{margin-left:258px;min-height:100vh}
  .topbar{background:var(--cream);border-bottom:1px solid var(--border);padding:0 36px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
  .topbar-left h2{font-family:'Jost',sans-serif;font-size:18px;font-weight:600;color:var(--dark);letter-spacing:0.5px;text-transform:uppercase}
  .topbar-left h2 em{font-style:normal;color:var(--terra)}
  .topbar-left p{font-size:10.5px;font-weight:300;color:var(--light);letter-spacing:1px;text-transform:uppercase;margin-top:1px}
  .pill{padding:5px 14px;border-radius:2px;font-size:10.5px;font-weight:500;letter-spacing:0.8px;text-transform:uppercase}
  .pill-terra{background:var(--terra);color:#fff}
  .content{padding:28px 36px 60px}
  .kpi-strip{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:5px;overflow:hidden;margin-bottom:22px;box-shadow:var(--shadow2)}
  .kpi-cell{background:var(--cream);padding:18px 18px 16px;transition:background 0.15s}
  .kpi-cell:hover{background:#fff}
  .kpi-label{font-size:10px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--mid);margin-bottom:10px;line-height:1.45}
  .kpi-val{font-family:'Jost',sans-serif;font-size:22px;font-weight:600;line-height:1;letter-spacing:-0.5px}
  .kv-terra{color:var(--terra)} .kv-dark{color:var(--dark)} .kv-amber{color:var(--amber)} .kv-green{color:var(--green)}
  .two-col{display:grid;grid-template-columns:1fr 210px;gap:18px;margin-bottom:18px}
  .card{background:var(--cream);border:1px solid var(--border);border-radius:5px;box-shadow:var(--shadow2);overflow:hidden;margin-bottom:18px}
  .card-head{padding:13px 20px;border-bottom:1px solid var(--border2);display:flex;align-items:center;gap:9px}
  .card-head-bar{width:16px;height:2px;border-radius:99px;flex-shrink:0}
  .card-head h3{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;letter-spacing:0.4px}
  .card-body{padding:20px}
  .seuils-chart{display:flex;align-items:flex-end;gap:24px;height:160px;padding:0 8px}
  .seuil-col{display:flex;flex-direction:column;align-items:center;flex:1;height:100%}
  .seuil-bar-wrap{flex:1;width:100%;display:flex;flex-direction:column;justify-content:flex-end;position:relative;margin-bottom:10px}
  .seuil-bar-bg{position:absolute;inset:0;border-radius:4px 4px 0 0;background:var(--border2)}
  .seuil-bar-fill{position:absolute;bottom:0;left:0;right:0;border-radius:4px 4px 0 0;transition:height 0.8s cubic-bezier(.22,1,.36,1);min-height:3px}
  .seuil-bar-val{position:absolute;top:-26px;left:50%;transform:translateX(-50%);font-family:'Jost',sans-serif;font-size:12px;font-weight:600;white-space:nowrap;letter-spacing:-0.3px}
  .seuil-pct-badge{position:absolute;bottom:8px;left:50%;transform:translateX(-50%);font-size:10px;font-weight:600;color:#fff;letter-spacing:0.3px;opacity:0.9}
  .seuil-col-label{font-size:9.5px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--mid);text-align:center;margin-bottom:4px;white-space:nowrap}
  .seuil-col-sub{font-size:10px;color:var(--light);font-weight:300;text-align:center;white-space:nowrap}
  .stat-row{padding:13px 20px;border-bottom:1px solid var(--border2);display:flex;align-items:center;justify-content:space-between}
  .stat-row:last-child{border-bottom:none}
  .stat-lbl{font-size:11px;font-weight:400;color:var(--mid)}
  .stat-num{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:500;line-height:1}
  .tbl-wrap{overflow-x:auto}
  table{width:100%;border-collapse:collapse;font-size:12.5px}
  thead th{background:var(--cream2);padding:9px 15px;font-size:9px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--mid);text-align:left;white-space:nowrap;border-bottom:1px solid var(--border)}
  tbody td{padding:10px 15px;border-bottom:1px solid var(--border2);color:var(--dark);vertical-align:middle}
  tbody tr:last-child td{border-bottom:none}
  tbody tr:hover{background:rgba(255,255,255,0.55)}
  .badge{display:inline-flex;align-items:center;padding:2px 9px;border-radius:2px;font-size:9.5px;font-weight:500;letter-spacing:0.8px;text-transform:uppercase;white-space:nowrap}
  .b-green{background:rgba(74,124,98,.12);color:var(--green)} .b-terra{background:rgba(196,113,74,.12);color:var(--terra3)}
  .b-amber{background:rgba(184,136,42,.12);color:var(--amber)} .b-dark{background:rgba(43,34,24,.08);color:var(--mid)}
  .b-gray{background:rgba(168,153,141,.14);color:var(--light)} .b-red{background:rgba(180,60,60,.1);color:#B43C3C}
  .fw5{font-weight:500} .ok{color:var(--green)} .no{color:var(--light);font-size:11px}
  .empty-row td{text-align:center;padding:24px;color:var(--light);font-style:italic;font-family:'Cormorant Garamond',serif;font-size:14px}
</style>
</head>

document.addEventListener('DOMContentLoaded',()=>{
  ['login-pwd','login-email'].forEach(id=>{
    const el=document.getElementById(id);
    if(el) el.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  });
});

function doLogin(){
  const email=document.getElementById('login-email').value.trim().toLowerCase();
  const pwd=document.getElementById('login-pwd').value;
  const err=document.getElementById('login-error');
  const user=CREDS[email];
  if(!user||user.password!==pwd){err.style.display='block';return;}
  err.style.display='none';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='block';
  startApp(user.name);
}

function doLogout(){
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('app').style.display='none';
  document.getElementById('login-email').value='';
  document.getElementById('login-pwd').value='';
  document.getElementById('sidebarList').innerHTML='';
}

function startApp(name){
  const isAdmin=(name==='ADMIN');
  document.getElementById('user-av').textContent=isAdmin?'DIR':ini(name);
  document.getElementById('user-name').textContent=isAdmin?'Direction':name;
  const list=document.getElementById('sidebarList');
  list.innerHTML='';
  if(isAdmin){
    document.getElementById('sidebar-search').style.display='block';
    document.getElementById('sidebar-lbl').style.display='block';
    Object.keys(DATA).forEach(n=>{
      const el=document.createElement('div');
      el.className='sidebar-item';el.dataset.name=n;
      el.innerHTML='<div class="av">'+ini(n)+'</div><span>'+n+'</span>';
      el.onclick=()=>select(n);
      list.appendChild(el);
    });
    select(Object.keys(DATA)[0]);
  } else {
    document.getElementById('sidebar-search').style.display='none';
    document.getElementById('sidebar-lbl').style.display='none';
    if(DATA[name]){
      render(DATA[name]);
    } else {
      document.getElementById('content').innerHTML='<div style="padding:40px;color:var(--light)">Aucune donnee trouvee pour ce compte.</div>';
    }
  }
}

function filterSidebar(q){
  document.querySelectorAll('.sidebar-item').forEach(el=>{
    el.style.display=el.dataset.name.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}

function select(name){
  document.querySelectorAll('.sidebar-item').forEach(e=>e.classList.remove('active'));
  const item=document.querySelector('.sidebar-item[data-name="'+name+'"]');
  if(item)item.classList.add('active');
  render(DATA[name]);
}
